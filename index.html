<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scentara | Luxury Fragrances</title>
    <style>
        /* ثيم Breathe المطور */
        :root { --main: #000; --bg: #fff; --grey: #f9f9f9; }
        body { font-family: 'serif', 'Times New Roman'; margin: 0; background: var(--bg); color: var(--main); }
        
        .announcement { background: var(--main); color: #fff; text-align: center; padding: 8px; font-size: 12px; letter-spacing: 2px; }
        
        header { display: flex; flex-direction: column; align-items: center; padding: 40px 0; border-bottom: 1px solid #eee; }
        .logo { font-size: 40px; letter-spacing: 12px; font-weight: 200; text-transform: uppercase; margin-bottom: 20px; }
        
        nav a { text-decoration: none; color: #000; margin: 0 15px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }

        .hero { height: 70vh; background: #eee url('https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&q=80&w=1500') center/cover; display: flex; align-items: center; justify-content: center; }
        .hero-box { background: rgba(255,255,255,0.9); padding: 40px 80px; text-align: center; }

        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1px; background: #eee; }
        .card { background: #fff; padding: 40px; text-align: center; transition: 0.3s; }
        .card:hover { opacity: 0.8; }
        .card img { width: 100%; height: 300px; object-fit: contain; margin-bottom: 20px; }
        
        .btn { background: #000; color: #fff; border: none; padding: 15px 35px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
        
        /* العربة */
        #cart-modal { display:none; position:fixed; right:0; top:0; width:350px; height:100%; background:#fff; box-shadow:-5px 0 15px rgba(0,0,0,0.1); z-index:9999; padding:30px; }
    </style>
</head>
<body>

    <div class="announcement">شحن مجاني لجميع محافظات مصر لفترة محدودة</div>

    <header>
        <div class="logo">SCENTARA</div>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#products">المتجر</a>
            <a href="#" onclick="toggleCart()">السلة (<span id="count">0</span>)</a>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-box">
            <h2 style="font-weight: 200; letter-spacing: 5px;">SCENTARA</h2>
            <p>Experience the Essence of Luxury</p>
            <button class="btn">اكتشف الآن</button>
        </div>
    </div>

    <div class="products" id="products">
        <div class="card">
            <div style="font-size: 50px;">🧴</div>
            <h3>MIDNIGHT OUD</h3>
            <p>1,500 EGP</p>
            <button class="btn" onclick="add('MIDNIGHT OUD', 1500)">إضافة للسلة</button>
        </div>
        <div class="card">
            <div style="font-size: 50px;">🕯️</div>
            <h3>ROYAL ROSE</h3>
            <p>1,200 EGP</p>
            <button class="btn" onclick="add('ROYAL ROSE', 1200)">إضافة للسلة</button>
        </div>
    </div>

    <div id="cart-modal">
        <h2 style="font-weight:200">سلتك</h2>
        <div id="items"></div>
        <hr>
        <button class="btn" style="width:100%" onclick="checkout()">طلب عبر واتساب</button>
        <p onclick="toggleCart()" style="text-align:center; cursor:pointer; margin-top:20px;">إغلاق</p>
    </div>

    <script>
        let cart = [];
        function add(n, p) { 
            cart.push({n, p}); 
            document.getElementById('count').innerText = cart.length;
            alert('تمت الإضافة لـ Scentara');
        }
        function toggleCart() {
            let m = document.getElementById('cart-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
            render();
        }
        function render() {
            let div = document.getElementById('items');
            div.innerHTML = cart.map(i => `<p>${i.n} - ${i.p} EGP</p>`).join('');
        }
        function checkout() {
            let msg = "طلب جديد من Scentara:%0a" + cart.map(i => i.n).join('%0a');
            window.open(`https://wa.me/201234567890?text=${msg}`);
        }
    </script>
</body>
</html>
