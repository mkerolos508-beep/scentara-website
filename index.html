<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentara</title>

<style>
body {
  margin: 0;
  font-family: 'Helvetica Neue', sans-serif;
  background: #f8f8f8;
  color: #111;
}

.container {
  display: flex;
  height: 100vh;
}

.left {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.left img {
  width: 60%;
}

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px;
}

.brand {
  font-size: 14px;
  letter-spacing: 3px;
  margin-bottom: 20px;
}

.title {
  font-size: 40px;
  margin-bottom: 20px;
}

.desc {
  color: #666;
  margin-bottom: 30px;
}

.btn {
  padding: 12px 30px;
  border: 1px solid #111;
  background: transparent;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #111;
  color: #fff;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="left">
    <img src="perfume.png" alt="Perfume">
  </div>

  <div class="right">
    <div class="brand">SCENTARA</div>
    <div class="title">Coco Creamé</div>
    <div class="desc">
      A soft blend of coconut and creamy vanilla, designed for elegance.
    </div>
    <button class="btn">Shop Now</button>
  </div>

</div>

</body>
</html>
